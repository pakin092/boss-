# Workflow for building and deploying a Node-based Vite/ThreeJS project to GitHub Pages
name: Deploy ThreeJS Game to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job ที่ 1: จัดการติดตั้งและบิวด์โค้ดทั้งหมด
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # ช่วยให้การบิวด์ในครั้งต่อๆ ไปเร็วขึ้นมาก

      - name: Install dependencies
        run: npm ci # ทำการติดตั้ง Library ทั้งหมดอย่างปลอดภัย

      - name: Build Project
        run: npm run build # สั่งรันคำสั่งบิวด์ (ปกติจะสร้างโฟลเดอร์ dist หรือ build)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ชี้เป้าไปที่โฟลเดอร์ผลลัพธ์ที่ได้จากการบิวด์เสร็จแล้ว (โฟลเดอร์ dist ของ Vite)
          path: './dist'

  # Job ที่ 2: นำผลลัพธ์ที่บิวด์แล้วขึ้นหน้าเว็บจริง
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
