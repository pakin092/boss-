# Sample workflow for building and deploying a Vite/React/ThreeJS site to GitHub Pages
name: Deploy ThreeJS RPG Site to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # หรือ 'yarn' / 'pnpm' ขึ้นอยู่กับที่โปรเจกต์คุณใช้

      - name: Install dependencies
        run: npm ci # ติดตั้ง package ทั้งหมดตาม package-lock.json

      - name: Build Project
        run: npm run build # บิวด์โปรเจกต์ (Vite จะสร้างโฟลเดอร์ dist ออกมา)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ระบุโฟลเดอร์ที่บิวด์เสร็จแล้ว (ถ้าเป็น Vite จะชื่อ dist, ถ้าเป็นอย่างอื่นอาจเป็น build หรือ out)
          path: './dist' 

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        
